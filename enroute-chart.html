<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enroute Chart - FlightPlan TH</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    .map-page { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .chart-toolbar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      flex-shrink: 0;
    }
    .chart-container {
      flex: 1;
      background: #888;
      position: relative;
      overflow: hidden;
    }
    .chart-embed {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    /* Fallback image viewer */
    .img-viewer {
      width: 100%; height: 100%;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: #fff;
      cursor: grab;
    }
    .img-viewer.grabbing { cursor: grabbing; }
    .img-viewer img {
      transform-origin: 0 0;
      user-select: none;
      display: block;
    }
    .zoom-controls {
      position: absolute;
      bottom: 20px; right: 20px;
      display: flex; flex-direction: column; gap: 4px;
      z-index: 100;
    }
    .zoom-btn {
      width: 36px; height: 36px;
      background: rgba(8,17,31,0.92);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 18px; font-weight: bold;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
      transition: background 0.15s;
    }
    .zoom-btn:hover { background: var(--bg-card-hover); }
    .zoom-label {
      background: rgba(8,17,31,0.92);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 11px; text-align: center;
      padding: 4px 6px;
      backdrop-filter: blur(8px);
      font-family: var(--mono);
    }
    #pdf-fallback { display: none; }
  </style>
</head>
<body>
  <div id="nav-placeholder" data-active="map"></div>

  <div class="map-page">
    <!-- Toolbar -->
    <div class="chart-toolbar">
      <span style="font-size:13px;font-weight:600;color:var(--accent);">🗺️ Enroute Chart — Thailand ICAO</span>
      <span style="font-size:12px;color:var(--text-secondary);display:none;" class="chart-desc-lg">
        AIS Thailand · ICAO Standard Enroute Chart · Bangkok FIR (VTBB)
      </span>
      <div style="margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
        <button class="btn btn-sm btn-secondary" onclick="toggleView()" id="toggleBtn">🖼 Image</button>
        <a href="Enroute Chart.pdf" download class="btn btn-sm btn-secondary">⬇ PDF</a>
        <a href="Enroute Chart.pdf" target="_blank" class="btn btn-sm btn-primary">↗ เต็มจอ</a>
      </div>
    </div>

    <!-- Chart Area -->
    <div class="chart-container" id="chartContainer">

      <!-- PRIMARY: Embedded PDF (looks exactly like the original) -->
      <div id="pdf-view" style="width:100%;height:100%;">
        <object
          id="pdfObject"
          data="Enroute Chart.pdf"
          type="application/pdf"
          class="chart-embed"
          onload="pdfLoaded()"
          onerror="showFallback()">
          <embed
            src="Enroute Chart.pdf"
            type="application/pdf"
            class="chart-embed"
            onerror="showFallback()">
          <div id="pdf-unavailable" style="
            display:flex; align-items:center; justify-content:center;
            height:100%; background:var(--bg-primary); color:var(--text-secondary);
            flex-direction:column; gap:16px; text-align:center;
          ">
            <div style="font-size:48px;">📄</div>
            <div style="font-size:16px;font-weight:600;color:var(--text-primary);">Enroute Chart</div>
            <div style="font-size:13px;">Browser ไม่รองรับ PDF embed</div>
            <div style="display:flex;gap:10px;">
              <a href="Enroute Chart.pdf" target="_blank" class="btn btn-primary">↗ เปิด PDF</a>
              <button class="btn btn-secondary" onclick="showFallback()">🖼 ดูเป็นภาพ</button>
            </div>
          </div>
        </object>
      </div>

      <!-- FALLBACK: High-res PNG with pan/zoom -->
      <div id="img-view" style="display:none;width:100%;height:100%;position:relative;">
        <div class="img-viewer" id="imgViewer">
          <img id="chartImg" src="chart_01.png" alt="Enroute Chart Thailand" draggable="false">
        </div>
        <!-- Zoom controls -->
        <div class="zoom-controls">
          <button class="zoom-btn" onclick="zoomIn()" title="Zoom In">+</button>
          <div class="zoom-label" id="zoomLabel">100%</div>
          <button class="zoom-btn" onclick="zoomOut()" title="Zoom Out">−</button>
          <button class="zoom-btn" onclick="zoomReset()" title="Reset" style="font-size:13px;">⟲</button>
        </div>
      </div>

    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let currentView = 'pdf'; // 'pdf' or 'img'

    function pdfLoaded() {
      // PDF loaded successfully, nothing to do
    }

    function showFallback() {
      document.getElementById('pdf-view').style.display = 'none';
      document.getElementById('img-view').style.display = 'block';
      document.getElementById('toggleBtn').textContent = '📄 PDF View';
      currentView = 'img';
      initPanZoom();
    }

    function toggleView() {
      if (currentView === 'pdf') {
        document.getElementById('pdf-view').style.display = 'none';
        document.getElementById('img-view').style.display = 'block';
        document.getElementById('toggleBtn').textContent = '📄 PDF View';
        currentView = 'img';
        initPanZoom();
      } else {
        document.getElementById('pdf-view').style.display = 'block';
        document.getElementById('img-view').style.display = 'none';
        document.getElementById('toggleBtn').textContent = '🖼 Image View';
        currentView = 'pdf';
      }
    }

    // ── Pan & Zoom for image fallback ──────────────────────────────────────────
    let scale = 1, minScale = 0.3, maxScale = 5;
    let isPanning = false, startX = 0, startY = 0, scrollLeft = 0, scrollTop = 0;
    let panInitDone = false;

    function initPanZoom() {
      if (panInitDone) return;
      panInitDone = true;
      const viewer = document.getElementById('imgViewer');
      const img    = document.getElementById('chartImg');

      img.onload = () => fitToView();
      if (img.complete) fitToView();

      // Mouse wheel zoom
      viewer.addEventListener('wheel', e => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const newScale = Math.min(maxScale, Math.max(minScale, scale * delta));
        const rect = viewer.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const imgRect = img.getBoundingClientRect();
        const ox = (mx + viewer.scrollLeft - imgRect.left) / scale;
        const oy = (my + viewer.scrollTop - imgRect.top) / scale;
        scale = newScale;
        img.style.transform = `scale(${scale})`;
        updateZoomLabel();
        // Adjust scroll to keep point under cursor
        viewer.scrollLeft = ox * scale + imgRect.left - mx;
        viewer.scrollTop  = oy * scale + imgRect.top  - my;
      }, { passive: false });

      // Pan drag
      viewer.addEventListener('mousedown', e => {
        if (e.button !== 0) return;
        isPanning = true;
        startX = e.clientX + viewer.scrollLeft;
        startY = e.clientY + viewer.scrollTop;
        viewer.classList.add('grabbing');
      });
      window.addEventListener('mousemove', e => {
        if (!isPanning) return;
        viewer.scrollLeft = startX - e.clientX;
        viewer.scrollTop  = startY - e.clientY;
      });
      window.addEventListener('mouseup', () => {
        isPanning = false;
        viewer.classList.remove('grabbing');
      });

      // Touch pinch-zoom
      let lastTouchDist = 0;
      viewer.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          lastTouchDist = Math.sqrt(dx*dx + dy*dy);
        }
      });
      viewer.addEventListener('touchmove', e => {
        if (e.touches.length === 2) {
          e.preventDefault();
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const delta = dist / lastTouchDist;
          scale = Math.min(maxScale, Math.max(minScale, scale * delta));
          img.style.transform = `scale(${scale})`;
          updateZoomLabel();
          lastTouchDist = dist;
        }
      }, { passive: false });
    }

    function fitToView() {
      const viewer = document.getElementById('imgViewer');
      const img    = document.getElementById('chartImg');
      const vw = viewer.clientWidth, vh = viewer.clientHeight;
      const iw = img.naturalWidth,   ih = img.naturalHeight;
      scale = Math.min(vw / iw, vh / ih) * 0.98;
      scale = Math.max(minScale, Math.min(maxScale, scale));
      // Use center-top origin so portrait chart centers in landscape browser
      img.style.transformOrigin = 'top center';
      img.style.transform = `scale(${scale})`;
      updateZoomLabel();
    }

    function zoomIn()    { scale = Math.min(maxScale, scale * 1.25); applyZoom(); }
    function zoomOut()   { scale = Math.max(minScale, scale * 0.8);  applyZoom(); }
    function zoomReset() { fitToView(); }

    function applyZoom() {
      document.getElementById('chartImg').style.transform = `scale(${scale})`;
      updateZoomLabel();
    }

    function updateZoomLabel() {
      document.getElementById('zoomLabel').textContent = Math.round(scale * 100) + '%';
    }
  </script>
</body>
</html>
